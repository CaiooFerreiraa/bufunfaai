name: api-ci

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches:
      - develop

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go mod tidy
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/api
      - run: test -f migrations/000001_initial_extensions.up.sql
